version: '3'

vars:
  SITE_DOCKER_FLAGS: >-
    -v ./www:/docs
    -v ./LICENSE:/docs/docs/LICENSE
    -v ./SECURITY.md:/docs/docs/security.md
    -v ./CHANGELOG.md:/docs/docs/changelog.md
    -v ./CODE-OF-CONDUCT.md:/docs/docs/code-of-conduct.md
    -v ./CONTRIBUTING.md:/docs/docs/contributing.md

tasks:
  build:frontend:
    desc: Build frontend assets
    dir: frontend
    cmds:
      - pnpm install --frozen-lockfile
      - pnpm run build

  build:backend:
    desc: Build backend binary
    cmds:
      - go build -ldflags='-s -w -X "github.com/filebrowser/filebrowser/v2/version.Version={{.VERSION}}" -X "github.com/filebrowser/filebrowser/v2/version.CommitSHA={{.GIT_COMMIT}}"' -o filebrowser .
    vars:
      GIT_COMMIT:
        sh: git log -n 1 --format=%h
      # On an exact tag this is the clean version (e.g. v1.4.0 → 1.4.0); on
      # any other commit it's "1.4.0-7-gabc1234" so dev/nightly builds are
      # self-identifying. Falls back to 0.0.0-dev when no tag is reachable.
      VERSION:
        sh: git describe --tags --match=v* 2>/dev/null | cut -c 2- || echo "0.0.0-dev"

  build:
    desc: Build both frontend and backend
    cmds:
      - task: build:frontend
      - task: build:backend

  build:image:
    desc: Build & push the multi-arch (amd64 + arm64) Docker image
    summary: |
      Cross-builds the self-contained image for linux/amd64 + linux/arm64 and
      pushes it to the registry. The frontend + Go binary are built INSIDE the
      Dockerfile, so this needs only Docker (no prior `task build`).

      Prerequisites (one-time):
        - a docker-container buildx builder (multi-platform needs it):
            docker buildx create --name multiarch --driver docker-container --bootstrap --use
        - registry login:
            echo $GHCR_TOKEN | docker login ghcr.io -u csummers-dev --password-stdin

      Usage:
        task build:image VERSION=2.2.0     # explicit version → tags :2.2.0 + :latest
        task build:image                   # version from `git describe`
        task build:image VERSION=2.2.0 PLATFORMS=linux/arm64   # single arch
    vars:
      IMAGE: '{{.IMAGE | default "ghcr.io/csummers-dev/filebrowser-pretty"}}'
      PLATFORMS: '{{.PLATFORMS | default "linux/amd64,linux/arm64"}}'
      GIT_COMMIT:
        sh: git rev-parse --short HEAD
      DESCRIBED:
        sh: git describe --tags --match=v* 2>/dev/null | cut -c 2- || echo "0.0.0-dev"
      VERSION: '{{.VERSION | default .DESCRIBED}}'
      CREATED:
        sh: date -u +%Y-%m-%dT%H:%M:%SZ
    cmds:
      - >-
        docker buildx build
        --platform {{.PLATFORMS}}
        --build-arg VERSION={{.VERSION}}
        --build-arg REVISION={{.GIT_COMMIT}}
        --build-arg CREATED={{.CREATED}}
        --tag {{.IMAGE}}:{{.VERSION}}
        --tag {{.IMAGE}}:latest
        --push
        .

  version:badge:
    desc: Sync the README version badge (defaults to the latest v* git tag)
    summary: |
      Updates the version badge in README.md.
        task version:badge            # use the latest v* tag
        task version:badge -- 1.4.0   # explicit version
    cmds:
      - ./scripts/update-readme-badge.sh {{.CLI_ARGS}}

  release:make:
    internal: true
    prompt: Do you wish to proceed?
    cmds:
      - pnpm dlx commit-and-tag-version -s

  release:dry-run:
    internal: true
    cmds:
      - pnpm dlx commit-and-tag-version --dry-run --skip

  release:
    desc: Create a new release
    cmds:
      - task: docs:cli:generate
      - git add www/docs/cli
      - |
        if [[ `git status www/docs/cli --porcelain` ]]; then
          git commit -m 'chore(docs): update CLI documentation'
        fi
      - task: release:dry-run
      - task: release:make

  docs:cli:generate:
    cmds:
      - rm -rf www/docs/cli
      - mkdir -p www/docs/cli
      - go run . docs
    generates:
      - www/docs/cli

  docs:docker:generate:
    internal: true
    cmds: 
      - docker build -f www/Dockerfile --progress=plain -t filebrowser.site www

  docs:
    desc: Generate documentation
    cmds:
      - rm -rf www/public
      - task: docs:docker:generate
      - docker run --rm {{.SITE_DOCKER_FLAGS}} filebrowser.site build -d "public"

  docs:serve:
    desc: Serve documentation
    cmds:
      - task: docs:docker:generate
      - docker run --rm -it -p 8000:8000 {{.SITE_DOCKER_FLAGS}} filebrowser.site
