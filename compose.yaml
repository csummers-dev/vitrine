# filebrowser pretty — a modern, polished File Browser fork.
#
# A "just works" single-instance setup using named volumes, so you can
#   docker compose up -d
# and reach it at http://localhost:8080 (watch the logs for the random
# admin password on first run).
#
# For production — mounting your real media folders into /srv, running it
# behind a reverse proxy, time zones, etc. — see the Docker section of the
# README.

services:
  filebrowser-pretty:
    image: ghcr.io/csummers-dev/filebrowser-pretty:latest
    container_name: filebrowser-pretty
    restart: unless-stopped

    ports:
      - "8080:80"

    volumes:
      # Served files. Replace this named volume with your real data in
      # production, e.g.  - /mnt/storage/Movies:/srv/Movies
      - srv:/srv
      # The app's own state — keep these to preserve users, shares, and
      # settings across restarts and image updates.
      - config:/config # app configuration
      - database:/database # embedded bbolt DB (users / shares / tags / sessions)

    environment:
      # The host user that OWNS your mounted data. On startup the container
      # fixes the ownership of its own state (/config, /database) to match,
      # then runs the app as this user — so just set these to `id -u` / `id -g`
      # of whoever owns your files. Your data in /srv is NOT modified: mount
      # folders already owned by PUID (user-owned subdirectories, not root-owned
      # NAS volume roots, or uploads 403). Defaults to 1000:1000.
      PUID: 1000
      PGID: 1000
      # Set your local time zone so timestamps + logs read correctly.
      TZ: Etc/UTC

    # The image ships its own healthcheck; this mirrors it explicitly.
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 3

# Multi-instance / HA only: point every instance at a shared Redis so upload
# state is consistent across them, via the `redisCacheUrl` setting (env
# FB_REDIS_CACHE_URL=redis://user:pass@host:port). Single-instance deployments
# use the built-in in-memory cache and need no Redis.

volumes:
  srv:
  config:
  database:
